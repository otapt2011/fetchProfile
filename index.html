<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=auto, user-scalable=no">
  <title>TikTok · All Participants + SQLite DB</title>
  <!-- JaferSQL (client‑side SQLite) -->
  <script src="jafersql.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#000; color:#fff;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      font-size:0.85rem; min-height:100vh; padding:10px; overflow-x:hidden;
    }
    .container { max-width:100vw; margin:0 auto; }
    .upload-area { text-align:center; margin:10px 0; }
    button {
      border:none; color:#fff; font-weight:600; padding:6px 14px; border-radius:20px;
      font-size:0.7rem; cursor:pointer; margin:3px; line-height:1.2;
    }
    .upload-btn { background:#FE2C55; }
    .fetch-btn { background:#2a9d8f; }
    .control-btn { background:#f4a261; }
    .stop-btn { background:#e63946; }
    .download-btn { background:#6c63ff; }
    button:disabled { opacity:0.5; cursor:not-allowed; }
    .stats-summary { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:8px 0; }
    .stat-box { background:#111; border:1px solid #2c2c2c; border-radius:8px; padding:6px 10px; text-align:center; min-width:70px; }
    .stat-box div:first-child { font-size:1.2rem; font-weight:bold; }
    .stat-box div:last-child { font-size:0.65rem; color:#aaa; }
    .progress-container { width:100%; height:4px; background:#2c2c2c; border-radius:2px; margin:8px 0; overflow:hidden; }
    .progress-bar { height:100%; width:0%; background:#FE2C55; }
    .progress-text { text-align:center; font-size:0.7rem; color:#aaa; margin-top:2px; }
    table { width:100%; border-collapse:collapse; margin-top:8px; font-size:0.7rem; }
    th { text-align:left; padding:4px; border-bottom:1px solid #333; color:#aaa; font-weight:600; cursor:pointer; user-select:none; font-size:0.7rem; }
    th:hover { color:#fff; }
    td { padding:3px 4px; border-bottom:1px solid #1a1a1a; vertical-align:middle; }
    .avatar-cell { width:24px; height:24px; border-radius:50%; object-fit:cover; border:1px solid #FE2C55; }
    .username-cell { font-weight:600; font-size:0.75rem; }
    .error-badge { background:#FE2C55; color:#fff; font-size:0.6rem; padding:1px 4px; border-radius:8px; }
    .failed-row { opacity:0.6; }
    .sort-arrow { margin-left:2px; font-size:0.6rem; }
    .control-panel { text-align:center; margin:6px 0; }
    .download-area { text-align:center; margin:10px 0; }
    .db-status { font-size:0.6rem; color:#4caf50; margin-top:2px; }
    @media (max-width:600px) {
      body { padding:5px; }
      button { padding:5px 10px; font-size:0.65rem; }
      table { font-size:0.65rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="upload-area">
      <button class="upload-btn" id="uploadBtn">📂 Upload TikTok Export JSON</button>
      <button class="fetch-btn" id="fetchAllBtn" disabled>⚡ Fetch All Profiles</button>
    </div>
    <div class="control-panel" id="controlPanel" style="display:none;">
      <button class="control-btn" id="pauseBtn">⏸️ Pause</button>
      <button class="stop-btn" id="stopBtn">⏹️ Stop</button>
    </div>
    <div class="download-area" id="downloadArea" style="display:none;">
      <button class="download-btn" id="downloadProfilesBtn">📥 Download Profiles (JSON)</button>
      <button class="download-btn" id="downloadMessagesBtn">📥 Download Messages (JSON)</button>
      <button class="download-btn" id="downloadSQLiteBtn" disabled>📥 Download SQLite DB</button>
      <div class="db-status" id="dbStatus"></div>
    </div>
    <div id="statusArea"></div>
    <div id="progressArea" style="display:none;">
      <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
      <div class="progress-text" id="progressText"></div>
    </div>
    <div id="tableArea"></div>
  </div>



  <script>
    // ---------- Embedded fetch (profile) ----------
    async function fetchTikTokProfile(username, options = {}) {
      const DEFAULT_BASE_URL = 'https://tik-proxy.vercel.app';
      const baseUrl = options.baseUrl || DEFAULT_BASE_URL;
      const apiKey = options.apiKey || localStorage.getItem('myKey');
      if (!apiKey) throw new Error('No API key found. Set localStorage.myKey first.');

      const url = `${baseUrl.replace(/\/$/, '')}/api/full?username=${encodeURIComponent(username.trim().replace(/^@/, ''))}`;

      const controller = new AbortController();
      const timeout = options.timeout || 15000;
      const timeoutId = setTimeout(() => controller.abort(), timeout);

      try {
        const res = await fetch(url, {
          headers: { 'X-API-Key': apiKey, 'Content-Type': 'application/json' },
          signal: controller.signal
        });
        clearTimeout(timeoutId);

        if (!res.ok) {
          let errMsg = `HTTP ${res.status}`;
          try { const err = await res.json(); errMsg = err.error || errMsg; } catch (_) {}
          throw new Error(errMsg);
        }
        const data = await res.json();
        if (!data.success) throw new Error(data.error || 'Unknown API error');
        return data;
      } catch (err) {
        clearTimeout(timeoutId);
        if (err.name === 'AbortError') throw new Error('Request timeout');
        throw err;
      }
    }

    // ---------- Fetch avatar as Blob ----------
    async function fetchAvatarBlob(avatarUrl) {
      if (!avatarUrl) return null;
      try {
        const response = await fetch(avatarUrl);
        if (!response.ok) return null;
        return await response.blob();
      } catch (e) {
        console.warn('Failed to fetch avatar blob', avatarUrl, e);
        return null;
      }
    }

    // ---------- Helpers ----------
    const escapeHtml = (s) => s ? s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])) : '';
    const formatNumber = (n) => n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(1)+'K' : n?.toString()||'0';

    let rawJsonData = null;
    let participants = [];
    let profileData = [];
    let fetchState = 'idle';
    let currentIndex = 0;

    // ---------- JaferSQL state ----------
    let sqliteDB = null;
    let sqliteReady = false;

    // ---------- IndexedDB (still kept for backward compatibility) ----------
    let db;
    async function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open('msgProxyExtractDB', 2);
        request.onupgradeneeded = (event) => {
          const db = event.target.result;
          if (!db.objectStoreNames.contains('profiles')) {
            db.createObjectStore('profiles', { keyPath: 'username' });
          }
        };
        request.onsuccess = (event) => {
          db = event.target.result;
          resolve(db);
        };
        request.onerror = (event) => reject(event.target.error);
      });
    }

    async function storeProfileInIDB(flatProfile) {
      if (!db) await openDB();
      const tx = db.transaction('profiles', 'readwrite');
      const store = tx.objectStore('profiles');
      store.put(flatProfile);
      return new Promise((resolve, reject) => {
        tx.oncomplete = resolve;
        tx.onerror = reject;
      });
    }

    function updateDBStatus() {
      const statusEl = document.getElementById('dbStatus');
      const btn = document.getElementById('downloadSQLiteBtn');
      if (sqliteReady) {
        statusEl.textContent = `SQLite ready. Rows: ${profileData.filter(r=>r.status==='success').length}`;
        btn.disabled = false;
      } else {
        statusEl.textContent = 'SQLite not initialized.';
        btn.disabled = true;
      }
    }

    // ---------- Participant extraction ----------
    function extractParticipants(jsonData, { stripDots = true } = {}) {
      const chatHistory = jsonData?.["Direct Message"]?.["Direct Messages"]?.["ChatHistory"];
      if (!chatHistory || typeof chatHistory !== 'object') throw new Error("ChatHistory not found");
      const countMap = new Map();
      for (const [chatKey, messages] of Object.entries(chatHistory)) {
        if (!chatKey.startsWith("Chat History with ") || !Array.isArray(messages)) continue;
        let participant = chatKey.slice("Chat History with ".length).replace(/:$/, '').trim();
        if (stripDots) participant = participant.replace(/^[.@]+/, '');
        for (const msg of messages) {
          let from = (msg.From || '').trim();
          if (stripDots) from = from.replace(/^[.@]+/, '');
          let to = '';
          if (from && from !== participant) to = participant;
          if (from) countMap.set(from, (countMap.get(from) || 0) + 1);
          if (to)   countMap.set(to,   (countMap.get(to)   || 0) + 1);
        }
      }
      return Array.from(countMap.entries())
        .map(([username, count]) => ({ username, msgCount: count }))
        .sort((a, b) => b.msgCount - a.msgCount || a.username.localeCompare(b.username));
    }

    // ---------- Message extraction ----------
    function extractMessages(jsonData, { stripDots = true } = {}) {
      const chatHistory = jsonData?.["Direct Message"]?.["Direct Messages"]?.["ChatHistory"];
      if (!chatHistory || typeof chatHistory !== 'object') throw new Error("ChatHistory not found");
      const allMessages = [];
      for (const [chatKey, messages] of Object.entries(chatHistory)) {
        if (!chatKey.startsWith("Chat History with ") || !Array.isArray(messages)) continue;
        let participant = chatKey.slice("Chat History with ".length).replace(/:$/, '').trim();
        if (stripDots) participant = participant.replace(/^[.@]+/, '');
        for (const msg of messages) {
          let from = (msg.From || '').trim();
          if (stripDots) from = from.replace(/^[.@]+/, '');
          let to = '';
          if (from && from !== participant) to = participant;
          allMessages.push({ date: msg.Date || '', from, to, content: msg.Content || '' });
        }
      }
      return allMessages;
    }

    // ---------- Flatten profile (all fields, no blob) ----------
    function flattenProfileData(apiResponse, msgCount) {
      const profile = apiResponse.profile || {};
      const stats = apiResponse.stats || {};
      return {
        ...profile,
        ...stats,
        msgCount: msgCount || 0
      };
    }

    // ---------- Sortable Table ----------
    let currentSort = { col: 'msgCount', dir: 'desc' };
    function sortData(data, col, dir) {
      return [...data].sort((a,b) => {
        let valA = a[col];
        let valB = b[col];
        if (typeof valA === 'string') valA = valA.toLowerCase();
        if (typeof valB === 'string') valB = valB.toLowerCase();
        if (valA < valB) return dir === 'asc' ? -1 : 1;
        if (valA > valB) return dir === 'asc' ? 1 : -1;
        return 0;
      });
    }

    function renderTable(data) {
      const tableArea = document.getElementById('tableArea');
      if (!data.length) {
        tableArea.innerHTML = '<div style="color:#aaa;text-align:center;margin-top:8px;">No data to display</div>';
        return;
      }
      const sorted = sortData(data, currentSort.col, currentSort.dir);
      let html = `<table>
        <thead><tr>
          <th></th>
          <th data-col="username" class="sortable">Username <span class="sort-arrow">${currentSort.col==='username' ? (currentSort.dir==='asc'?'▲':'▼') : ''}</span></th>
          <th data-col="displayName" class="sortable">Name <span class="sort-arrow">${currentSort.col==='displayName' ? (currentSort.dir==='asc'?'▲':'▼') : ''}</span></th>
          <th data-col="followerCount" class="sortable">Followers <span class="sort-arrow">${currentSort.col==='followerCount' ? (currentSort.dir==='asc'?'▲':'▼') : ''}</span></th>
          <th data-col="followingCount" class="sortable">Following <span class="sort-arrow">${currentSort.col==='followingCount' ? (currentSort.dir==='asc'?'▲':'▼') : ''}</span></th>
          <th data-col="heartCount" class="sortable">Likes <span class="sort-arrow">${currentSort.col==='heartCount' ? (currentSort.dir==='asc'?'▲':'▼') : ''}</span></th>
          <th data-col="videoCount" class="sortable">Videos <span class="sort-arrow">${currentSort.col==='videoCount' ? (currentSort.dir==='asc'?'▲':'▼') : ''}</span></th>
          <th data-col="msgCount" class="sortable">Msgs <span class="sort-arrow">${currentSort.col==='msgCount' ? (currentSort.dir==='asc'?'▲':'▼') : ''}</span></th>
        </tr></thead><tbody>`;
      for (const row of sorted) {
        const isFailed = row.status === 'failed';
        html += `<tr class="${isFailed ? 'failed-row' : ''}">`;
        html += `<td><img class="avatar-cell" src="${escapeHtml(row.avatarUrl)}" alt="" onerror="this.style.display='none'"></td>`;
        html += `<td class="username-cell">${escapeHtml(row.username)} ${isFailed ? '<span class="error-badge">fail</span>' : ''}</td>`;
        html += `<td>${escapeHtml(row.displayName || '—')} ${row.verified ? '<span style="background:#20D5EC;color:#000;font-size:0.55rem;padding:1px 4px;border-radius:6px;">✓</span>' : ''}</td>`;
        html += `<td>${formatNumber(row.followerCount)}</td>`;
        html += `<td>${formatNumber(row.followingCount)}</td>`;
        html += `<td>${formatNumber(row.heartCount)}</td>`;
        html += `<td>${formatNumber(row.videoCount)}</td>`;
        html += `<td><strong>${formatNumber(row.msgCount)}</strong></td>`;
        html += `</tr>`;
      }
      html += `</tbody></table>`;
      tableArea.innerHTML = html;
      document.querySelectorAll('th.sortable').forEach(th => {
        th.addEventListener('click', () => {
          const col = th.dataset.col;
          if (currentSort.col === col) {
            currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
          } else {
            currentSort.col = col;
            currentSort.dir = 'desc';
          }
          renderTable(profileData);
        });
      });
    }

    // ---------- JaferSQL helpers ----------
    async function initSQLite() {
      // Close previous if exists
      if (sqliteDB) {
        try { sqliteDB.jaferClose(); } catch(e) {}
        sqliteDB = null;
      }
      try {
        sqliteDB = await JaferSQL.jaferInit();  // creates in‑memory DB
        // Create table (all columns from API + message count + status + avatar blob)
        sqliteDB.jaferExec(`
          CREATE TABLE IF NOT EXISTS profiles (
            username TEXT PRIMARY KEY,
            displayName TEXT,
            avatarUrl TEXT,
            bio TEXT,
            verified INTEGER,
            privateAccount INTEGER,
            secUid TEXT,
            followerCount INTEGER,
            followingCount INTEGER,
            heartCount INTEGER,
            videoCount INTEGER,
            msgCount INTEGER,
            status TEXT,
            avatar BLOB
          )
        `);
        sqliteReady = true;
        updateDBStatus();
      } catch (err) {
        console.error('Failed to initialize JaferSQL:', err);
        sqliteReady = false;
        sqliteDB = null;
      }
    }

    async function insertProfileIntoSQLite(flat) {
      if (!sqliteReady || !sqliteDB) return;
      try {
        // Convert avatar Blob to Uint8Array if present
        let avatarBinary = null;
        if (flat.avatar instanceof Blob) {
          const buf = await flat.avatar.arrayBuffer();
          avatarBinary = new Uint8Array(buf);
        }
        // Use named parameters to avoid order issues
        const stmt = sqliteDB._db.prepare(`
          INSERT OR REPLACE INTO profiles
            (username, displayName, avatarUrl, bio, verified, privateAccount, secUid,
             followerCount, followingCount, heartCount, videoCount, msgCount, status, avatar)
          VALUES
            (:username, :displayName, :avatarUrl, :bio, :verified, :privateAccount, :secUid,
             :followerCount, :followingCount, :heartCount, :videoCount, :msgCount, :status, :avatar)
        `);
        stmt.bind({
          ':username': flat.username,
          ':displayName': flat.displayName || null,
          ':avatarUrl': flat.avatarUrl || null,
          ':bio': flat.bio || null,
          ':verified': flat.verified ? 1 : 0,
          ':privateAccount': flat.privateAccount ? 1 : 0,
          ':secUid': flat.secUid || null,
          ':followerCount': flat.followerCount || 0,
          ':followingCount': flat.followingCount || 0,
          ':heartCount': flat.heartCount || 0,
          ':videoCount': flat.videoCount || 0,
          ':msgCount': flat.msgCount || 0,
          ':status': flat.status || 'success',
          ':avatar': avatarBinary
        });
        stmt.step();
        stmt.free();
      } catch (err) {
        console.error('SQLite insert error for', flat.username, err);
      }
    }

    async function downloadSQLiteDB() {
      if (!sqliteReady || !sqliteDB) {
        alert('SQLite database not ready. Start fetching profiles first.');
        return;
      }
      const data = sqliteDB.jaferExport(); // Uint8Array
      const blob = new Blob([data], { type: 'application/x-sqlite3' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'tiktok_profiles.db';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // ---------- Fetch logic with pause/resume/stop ----------
    function sleep(ms) { return new Promise(res => setTimeout(res, ms)); }
    async function waitIfPaused() { while (fetchState === 'paused') await sleep(200); }

    async function fetchAllProfiles(list) {
      fetchState = 'running';
      updateControlButtons();
      const total = list.length;
      const progressBar = document.getElementById('progressBar');
      const progressText = document.getElementById('progressText');
      document.getElementById('downloadArea').style.display = 'none';

      // Initialize JaferSQL DB before starting
      await initSQLite();

      for (let i = 0; i < total; i++) {
        if (fetchState === 'stopped') break;
        await waitIfPaused();
        if (fetchState === 'stopped') break;

        const p = list[i];
        progressBar.style.width = ((i / total) * 100) + '%';
        progressText.textContent = `Profile ${i+1}/${total}: @${p.username} (${formatNumber(p.msgCount)} msgs)`;

        try {
          const resp = await fetchTikTokProfile(p.username, { timeout: 15000 });
          let flat = flattenProfileData(resp, p.msgCount);
          flat.status = 'success';

          // Fetch avatar blob
          flat.avatar = await fetchAvatarBlob(flat.avatarUrl);

          profileData.push(flat);

          // Store in IndexedDB (optional)
          storeProfileInIDB(flat).catch(e => console.error('IndexedDB storage error:', e));

          // Insert into SQLite (with avatar blob)
          await insertProfileIntoSQLite(flat);
        } catch (err) {
          profileData.push({
            username: p.username, displayName: '', avatarUrl: '', bio: '', verified: false,
            privateAccount: false, secUid: '',
            followerCount: 0, followingCount: 0, heartCount: 0, videoCount: 0,
            msgCount: p.msgCount, status: 'failed', error: err.message
          });
        }

        currentIndex = i + 1;
        if (fetchState !== 'stopped') await sleep(1000);

        if ((currentIndex % 10 === 0) && currentIndex < total && fetchState === 'running') {
          progressText.textContent = 'Batch complete. Pausing 3 seconds...';
          await sleep(3000);
        }
        renderTable(profileData);
        updateDBStatus();  // refresh SQLite status after each row
      }

      if (fetchState !== 'stopped') {
        progressBar.style.width = '100%';
        const ok = profileData.filter(r => r.status === 'success').length;
        progressText.textContent = `Done! ${ok}/${total} profiles.`;
      } else {
        progressText.textContent = `Stopped after ${currentIndex} profiles.`;
      }

      fetchState = 'idle';
      updateControlButtons();
      document.getElementById('downloadArea').style.display = 'block';
      updateDBStatus();
    }

    function updateControlButtons() {
      const panel = document.getElementById('controlPanel');
      const fetchBtn = document.getElementById('fetchAllBtn');
      const pauseBtn = document.getElementById('pauseBtn');
      const stopBtn = document.getElementById('stopBtn');

      switch (fetchState) {
        case 'idle':
          panel.style.display = 'none';
          fetchBtn.disabled = false;
          break;
        case 'running':
          panel.style.display = 'block';
          pauseBtn.textContent = '⏸️ Pause';
          pauseBtn.disabled = false;
          stopBtn.disabled = false;
          fetchBtn.disabled = true;
          break;
        case 'paused':
          pauseBtn.textContent = '▶️ Resume';
          pauseBtn.disabled = false;
          stopBtn.disabled = false;
          fetchBtn.disabled = true;
          break;
        case 'stopped':
          panel.style.display = 'none';
          fetchBtn.disabled = false;
          break;
      }
    }

    function pauseFetch() {
      if (fetchState === 'running') fetchState = 'paused';
      else if (fetchState === 'paused') fetchState = 'running';
      updateControlButtons();
    }

    function stopFetch() {
      fetchState = 'stopped';
      updateControlButtons();
    }

    // ---------- Downloads ----------
    function downloadJSON(data, filename) {
      // Remove avatar blob before serializing
      const cleaned = data.map(item => {
        const { avatar, ...rest } = item;
        return rest;
      });
      const blob = new Blob([JSON.stringify(cleaned, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function downloadProfiles() {
      if (!profileData.length) return alert('No profile data yet.');
      downloadJSON(profileData, 'tiktok_profiles.json');
    }

    function downloadMessages() {
      if (!rawJsonData) return alert('Upload a TikTok export first.');
      const messages = extractMessages(rawJsonData, { stripDots: true });
      const blob = new Blob([JSON.stringify(messages, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'tiktok_messages.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    // ---------- Upload & initialise ----------
    document.getElementById('uploadBtn').addEventListener('click', () => {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const status = document.getElementById('statusArea');
        status.innerHTML = '<div style="color:#aaa;font-size:0.75rem;">Extracting…</div>';
        document.getElementById('downloadArea').style.display = 'none';
        profileData = [];
        // Reset SQLite
        if (sqliteDB) { try { sqliteDB.jaferClose(); } catch(e) {} sqliteDB = null; }
        sqliteReady = false;
        updateDBStatus();
        try {
          const text = await file.text();
          rawJsonData = JSON.parse(text);
          participants = extractParticipants(rawJsonData, { stripDots: true });
          if (!participants.length) {
            status.innerHTML = '<div class="error" style="font-size:0.75rem;">No participants found.</div>';
            return;
          }
          status.innerHTML = `
            <div class="stats-summary">
              <div class="stat-box"><div>${participants.length}</div><div>Participants</div></div>
              <div class="stat-box"><div>${participants.reduce((s,p) => s + p.msgCount, 0)}</div><div>Total Msgs</div></div>
            </div>`;
          document.getElementById('fetchAllBtn').disabled = false;
          renderTable([]);
          fetchState = 'idle';
          updateControlButtons();
          document.getElementById('downloadArea').style.display = 'block';
          // Init IndexedDB
          openDB().then(() => console.log('IndexedDB ready')).catch(e => console.error('IndexedDB open error', e));
          // JaferSQL will be initialized when fetch starts
          document.getElementById('downloadSQLiteBtn').disabled = true;
        } catch (err) {
          status.innerHTML = `<div class="error" style="font-size:0.75rem;">❌ ${escapeHtml(err.message)}</div>`;
        }
      };
      input.click();
    });

    document.getElementById('fetchAllBtn').addEventListener('click', async () => {
      if (!participants.length || fetchState !== 'idle') return;
      document.getElementById('progressArea').style.display = 'block';
      await fetchAllProfiles(participants);
    });

    document.getElementById('pauseBtn').addEventListener('click', pauseFetch);
    document.getElementById('stopBtn').addEventListener('click', stopFetch);
    document.getElementById('downloadProfilesBtn').addEventListener('click', downloadProfiles);
    document.getElementById('downloadMessagesBtn').addEventListener('click', downloadMessages);
    document.getElementById('downloadSQLiteBtn').addEventListener('click', downloadSQLiteDB);
  </script>
</body>
</html>
